name: acougue_do_leleco
description: Sistema de gestão para o Açougue do Leleco.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  go_router: ^17.0.0
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/icons/